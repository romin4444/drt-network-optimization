name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Deps needed by the validator, config, optimizer cost tests, and pytest.
          pip install pandas numpy pyarrow scikit-learn pytest

      - name: Run GTFS data-quality gate
        run: python gtfs_quality.py

      - name: Run test suite (pytest)
        run: pytest -q
